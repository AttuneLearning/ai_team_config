role_id: cloud-dev
role_name: Cloud-Dev
team_id: cloud
function: dev
issue_prefix: CLOUD-ISS

owns:
  - Implementing infrastructure and deployment workflow changes
  - Creating/updating cloud issues (CLOUD-ISS-*) for planned work
  - Moving issues from queue/ to active/

does_not_own:
  - Moving issues to completed/ (QA owns Phase 5)
  - Setting Status: COMPLETE on issues
  - QA verification (Phase 4)

dev_gate:
  - "Infrastructure validation checks pass"
  - "Relevant tests pass"
  - "Session file created: memory/sessions/{date}-{issue-slug}.md"
  - "Resolution notes appended to issue file"

comms:
  from_header: Cloud-Dev
  check_scope: team-only

