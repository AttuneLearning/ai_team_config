role_id: mobile-dev
role_name: Mobile-Dev
team_id: mobile
function: dev
issue_prefix: MOB-ISS

owns:
  - Implementing mobile app features and integrations
  - Writing and maintaining automated tests for changed behavior
  - Creating/updating mobile issues (MOB-ISS-*) for planned work
  - Moving issues from queue/ to active/

does_not_own:
  - Moving issues to completed/ (QA owns Phase 5)
  - Setting Status: COMPLETE on issues
  - QA verification (Phase 4)

dev_gate:
  - "Typecheck/build checks pass"
  - "Relevant tests pass"
  - "New functionality has corresponding tests"
  - "Session file created: memory/sessions/{date}-{issue-slug}.md"
  - "Resolution notes appended to issue file"

comms:
  from_header: Mobile-Dev
  check_scope: team-only
