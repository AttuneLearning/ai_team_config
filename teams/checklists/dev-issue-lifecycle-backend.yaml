# =============================================================================
# Dev Lifecycle Checklist (Backend-Dev)
# =============================================================================
#
# Two nested loops for ALL backend development work:
#   OUTER: Poll → Assess → Plan → Contracts → [inner loop per issue]
#   INNER: Implement → Verify → Document → QA Handoff → Iterate
#
# =============================================================================

version: "3.0.0"
name: Dev Lifecycle (Backend)
applies_to:
  - backend-dev

# ---------------------------------------------------------------------------
# Phase 0: Comms Poll & Triage
# ---------------------------------------------------------------------------

phase_0_comms:
  name: Poll comms and triage
  trigger: start_of_iteration
  steps:
    - Read backend/inbox/ for new messages
    - Read backend/issues/queue/ for unstarted issues
    - Read backend/issues/active/ for in-progress or QA-blocked issues
    - Check active issues for "Awaiting Response" entries; scan inbox for matching replies
    - Classify each inbox message:
        - contract_request → Phase 1
        - implementation_plan → Phase 0b
        - qa_finding → match to active issue, prioritize re-fix
        - frontend_bug_report → Phase 0b (assess, create issue)
        - reply_to_outbound → match to original thread, unblock or create issue
        - status_update → acknowledge, no action unless blocking
    - Match findings and cross-team requests to active issues
    - Unblock issues where dependencies are resolved
  sources:
    - dev_communication/backend/inbox
    - dev_communication/backend/issues/queue
    - dev_communication/backend/issues/active

# ---------------------------------------------------------------------------
# Phase 0b: Assess & Decompose
# ---------------------------------------------------------------------------

phase_0b_assess:
  name: Assess and decompose into issues
  trigger: new_plan_or_large_request
  steps:
    - Read the full request/plan document
    - Identify distinct work items (endpoints, enhancements, bug fixes, confirmations)
    - Group into phases ordered by dependency
    - Create a plan document in dev_communication/shared/plans/ if needed
    - Create individual issues in backend/issues/queue/ for each work item
    - Note dependencies between issues
    - Proceed to Phase 1

# ---------------------------------------------------------------------------
# Phase 1: Contracts & Cross-Team Setup
# ---------------------------------------------------------------------------

phase_1_contracts:
  name: Define or update contracts
  steps:
    - Read frontend contract requests from backend/inbox/
    - Read contracts/types/ for existing DTOs
    - Define contract DTOs for each new/changed endpoint
    - Send ONE consolidated contract confirmation to frontend/inbox/
    - If no contract changes needed, proceed to Phase 2
  rule: >
    Backend owns contracts, frontend consumes them. Send ALL contracts
    upfront for multi-endpoint plans. (ADR-DEV-004)
  outbound_tracking: >
    When sending a contract request or clarification, note it in the
    related issue file under "Awaiting Response" with message filename
    and date. Remove when the reply is processed.

# ---------------------------------------------------------------------------
# Phase 2: Context Loading
# ---------------------------------------------------------------------------

phase_2_context:
  name: Load context
  steps:
    - Load relevant ADRs from dev_communication/shared/architecture/decisions/
    - Load memory patterns from memory/patterns/
    - Read the issue file for acceptance criteria and prior QA findings
    - Review existing code in the affected domain

# ---------------------------------------------------------------------------
# Phase 3: Implementation
# ---------------------------------------------------------------------------

phase_3_implement:
  name: Implement
  steps:
    - Move issue from queue/ to active/ (if not already)
    - Plan if complex (schema migration, multi-service change, new middleware)
    - Implement following project architecture
    - Ensure response shapes match contract DTOs exactly
    - Write tests for new functionality
    - If QA re-fix, address specific QA findings first
  rules:
    - New functionality MUST have corresponding tests
    - Response shapes MUST match shared contract DTOs
    - Do not add backward-compatibility shims or deprecated fields

# ---------------------------------------------------------------------------
# Phase 4: Dev Verification Gate (BLOCKING)
# ---------------------------------------------------------------------------

phase_4_verify:
  name: Dev verification gate
  blocking: true
  checks:
    typecheck:
      command: npx tsc --noEmit
      criteria: 0 errors
    unit_tests:
      command: npm run test:unit
      criteria: all pass
    integration_tests:
      command: npm run test:integration
      criteria: all pass
    tests_exist:
      criteria: new functionality has corresponding tests
  on_failure: fix and re-run — do not proceed

# ---------------------------------------------------------------------------
# Phase 5: Documentation & Handoff
# ---------------------------------------------------------------------------

phase_5_document:
  name: Document and hand off to QA
  steps:
    - Create session file at memory/sessions/{date}-{issue-slug}.md
    - Append resolution notes to the issue file
    - If contract was added/changed, confirm contracts/types/ is updated
    - If frontend impact, send message to frontend/inbox/
    - Commit and push
  handoff_rule: >
    Issue stays in active/ with Status: ACTIVE.
    Do NOT move to completed/. Do NOT set Status: COMPLETE.
    QA owns verification and completion.

# ---------------------------------------------------------------------------
# Phase 6: Iterate
# ---------------------------------------------------------------------------

phase_6_iterate:
  name: Iterate
  while_waiting: >
    Pick the next unblocked issue and begin Phase 2.
    Multiple issues can be in-flight at different phases.
  outcomes:
    pass: QA moves issue to completed/ — done
    blocked: return to Phase 0 with QA findings, iterate
    need_more_info: return to Phase 0, respond to QA questions
  loop: phase_0_comms
  exit_condition: >
    All issues moved to completed/ by QA, no issues in queue/,
    no unprocessed inbox messages, no open outbound threads.

# ---------------------------------------------------------------------------
# Automation
# ---------------------------------------------------------------------------

automation:
  commands:
    typecheck: npx tsc --noEmit
    unit: npm run test:unit
    integration: npm run test:integration
  issue_prefix: API-ISS
  session_path: memory/sessions/{date}-{issue-slug}.md
