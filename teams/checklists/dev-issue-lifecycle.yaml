# =============================================================================
# Dev Lifecycle Checklist (Frontend-Dev)
# =============================================================================
#
# Two nested loops for ALL frontend development work:
#   OUTER: Poll → Assess → Plan → Contracts → [inner loop per issue]
#   INNER: Implement → Verify → Document → QA Handoff → Iterate
#
# =============================================================================

version: "2.0.0"
name: Dev Lifecycle (Frontend)
applies_to:
  - frontend-dev

# ---------------------------------------------------------------------------
# Phase 0: Comms Poll & Triage
# ---------------------------------------------------------------------------

phase_0_comms:
  name: Poll comms and triage
  trigger: start_of_iteration
  blocking: true
  procedure_ref: procedures/polling-workflow.md (Steps 1-2)
  steps:
    # ---------------------------------------------------------------
    # SCAN — read CONTENTS, not filenames
    # ---------------------------------------------------------------
    - List and READ CONTENTS of every file in frontend/inbox/ (not completed/)
    - List and READ CONTENTS of every file in frontend/issues/queue/
    - List and READ CONTENTS of every file in frontend/issues/active/
    - Check active issues for "Awaiting Response" entries
    - Do NOT dismiss issues based on metadata — read and assess each one

    # ---------------------------------------------------------------
    # TRIAGE — classify and output proof
    # ---------------------------------------------------------------
    - Classify each inbox message:
        - contract_update → Phase 1
        - implementation_plan → Phase 0b
        - qa_finding → match to active issue, prioritize re-fix
        - backend_response → match to original thread, unblock or create issue
        - question → respond directly
        - status_update → acknowledge, no action unless blocking
    - Match findings and backend responses to active issues
    - Unblock issues where dependencies are resolved
    - Pick next issue (lowest ID unblocked, or QA-rejected first)

    # ---------------------------------------------------------------
    # VERIFICATION — required before proceeding
    # ---------------------------------------------------------------
    - Output triage summary with counts and action items
  verification:
    criteria: All inbox messages read and classified before any Phase 1+ work begins
    required_output: |
      ## Poll Iteration [N]
      Inbox: [X] messages read, [Y] actionable
      Queue: [X] issues | Active: [X] issues
      New work found: YES/NO
    on_failure: Do NOT proceed to implementation — finish the scan first
  sources:
    - dev_communication/frontend/inbox (exclude completed/ subdirectory)
    - dev_communication/frontend/issues/queue
    - dev_communication/frontend/issues/active

# ---------------------------------------------------------------------------
# Phase 0b: Assess & Decompose
# ---------------------------------------------------------------------------

phase_0b_assess:
  name: Assess and decompose into issues
  trigger: new_plan_or_large_request
  steps:
    - Read the full request/plan document
    - Identify distinct work items (components, pages, bug fixes, confirmations)
    - Group into phases ordered by dependency
    - Create a plan document in dev_communication/shared/plans/ if needed
    - Create individual issues in frontend/issues/queue/ for each work item
    - Note dependencies between issues
    - Proceed to Phase 1

# ---------------------------------------------------------------------------
# Phase 1: Contracts & Cross-Team Setup
# ---------------------------------------------------------------------------

phase_1_contracts:
  name: Check and request contracts
  steps:
    - Read contracts/types/ for existing DTOs
    - If new/changed endpoints needed, send request to backend/inbox/
    - Wait for backend acknowledgment before implementing against new contracts
    - If contracts already exist and are sufficient, proceed
  rule: >
    Never invent local type shapes that differ from contract DTOs.
    Never write normalizers, transforms, or compatibility shims.
    If the contract is insufficient, send a message — don't work around it.
    (ADR-DEV-004)
  outbound_tracking: >
    When sending a contract request or clarification, note it in the
    related issue file under "Awaiting Response" with message filename
    and date. Remove when the reply is processed.

# ---------------------------------------------------------------------------
# Phase 2: Context Loading
# ---------------------------------------------------------------------------

phase_2_context:
  name: Load context
  steps:
    - Load relevant ADRs from dev_communication/shared/architecture/decisions/
    - Load memory patterns from memory/patterns/
    - Read the issue file for acceptance criteria and prior QA findings
    - Review existing code in the affected domain

# ---------------------------------------------------------------------------
# Phase 3: Implementation
# ---------------------------------------------------------------------------

phase_3_implement:
  name: Implement
  steps:
    - Move issue from queue/ to active/ (if not already)
    - Plan if complex (multi-file, architectural decision, multiple approaches)
    - Implement following existing patterns and ADRs
    - Consume contract DTOs directly — no normalizers
    - Write tests for new functionality
    - If QA re-fix, address specific QA findings first
  rules:
    - New functionality MUST have corresponding tests
    - Follow FSD architecture (entities, features, pages, shared, widgets)
    - Consume contracts directly (ADR-DEV-004)

# ---------------------------------------------------------------------------
# Phase 4: Dev Verification Gate (BLOCKING)
# ---------------------------------------------------------------------------

phase_4_verify:
  name: Dev verification gate
  blocking: true
  checks:
    typecheck:
      command: npx tsc --noEmit
      criteria: 0 errors
    unit_tests:
      command: npx vitest run
      criteria: all pass
    integration_tests:
      command: npx vitest run --config vitest.integration.config.ts
      criteria: all pass
    tests_exist:
      criteria: new functionality has corresponding tests
  on_failure: fix and re-run — do not proceed

# ---------------------------------------------------------------------------
# Phase 5: Documentation & Handoff
# ---------------------------------------------------------------------------

phase_5_document:
  name: Document and hand off to QA
  steps:
    - Create session file at memory/sessions/{date}-{issue-slug}.md
    - Append resolution notes to the issue file
    - If cross-team impact, send message to backend/inbox/
    - Commit and push
  handoff_rule: >
    Issue stays in active/ with Status: ACTIVE.
    Do NOT move to completed/. Do NOT set Status: COMPLETE.
    QA owns verification and completion.

# ---------------------------------------------------------------------------
# Phase 5b: Inbox Cleanup
# ---------------------------------------------------------------------------

phase_5b_cleanup:
  name: Move processed messages to completed
  procedure_ref: procedures/polling-workflow.md (Step 4)
  steps:
    - For each inbox message processed this iteration, move to inbox/completed/:
        - question → moved when response sent
        - contract_update → moved when consumed or issue created
        - qa_finding → moved when fix implemented and re-handoff sent
        - backend_response → moved when consumed and issue unblocked
        - status_update → moved when read and acknowledged
    - Only messages in inbox/ root — never touch completed/
  rule: >
    Inbox should only contain unprocessed messages. Cleanup happens after
    every work phase, not at the end of the session.

# ---------------------------------------------------------------------------
# Phase 6: Iterate
# ---------------------------------------------------------------------------

phase_6_iterate:
  name: Iterate
  while_waiting: >
    Pick the next unblocked issue and begin Phase 2.
    Multiple issues can be in-flight at different phases.
  outcomes:
    pass: QA moves issue to completed/ — done
    blocked: return to Phase 0 with QA findings, iterate
    need_more_info: return to Phase 0, respond to QA questions
  loop: phase_0_comms
  exit_condition: >
    All issues moved to completed/ by QA, no issues in queue/,
    no unprocessed inbox messages, no open outbound threads.

# ---------------------------------------------------------------------------
# Automation
# ---------------------------------------------------------------------------

automation:
  commands:
    typecheck: npx tsc --noEmit
    unit: npx vitest run
    integration: npx vitest run --config vitest.integration.config.ts
  issue_prefix: UI-ISS
  session_path: memory/sessions/{date}-{issue-slug}.md
