version: "4.0.0"
name: Dev Lifecycle (Frontend)
applies_to: [frontend-dev]

phase_0_comms:
  name: Scan & triage
  blocking: true
  steps:
    - Read CONTENTS of every file in frontend/inbox/ (not completed/)
    - Read CONTENTS of every file in frontend/issues/queue/ and active/
    - Check active issues for Awaiting Response entries
    - Classify messages and output triage summary
  verification:
    required_output: |
      ## Poll Iteration [N]
      Inbox: [X] messages, [Y] actionable
      Queue: [X] | Active: [X]
      New work found: YES/NO

phase_0b_assess:
  name: Assess & decompose
  steps:
    - Identify work items, group by dependency
    - Create issues in queue/

phase_1_contracts:
  name: Request/consume contracts
  rule: Frontend consumes contracts from contracts/types/. Never write normalizers.

phase_2_context:
  name: Load context
  steps: [ADRs, memory patterns, issue criteria, existing code]

phase_3_implement:
  name: Implement
  rules:
    - New functionality MUST have tests
    - Response shapes MUST match contract DTOs
    - No backward-compat shims

phase_4_verify:
  name: Dev verification gate
  blocking: true
  checks:
    typecheck: { command: "npx tsc --noEmit", criteria: "0 errors" }
    unit_tests: { command: "npx vitest run", criteria: "all pass" }
    integration: { command: "npx vitest run --config vitest.integration.config.ts", criteria: "all pass" }
    tests_exist: { criteria: "new code has tests" }

phase_5_document:
  name: Document & handoff
  blocking: true
  steps:
    - Create session file memory/sessions/{date}-{issue-slug}.md
    - Append resolution notes to issue file
    - If cross-team impact, send message to backend/inbox/
    - Commit and push
  handoff:
    rule: BOTH artifacts required. Commit+push is NOT a handoff. Omitting either → QA skips.
    a_issue_file: "Append `## Dev Response ({ISO ts})` to issues/active/{file}.md. On re-handoff, ts MUST be newer than latest `## QA Verification`."
    b_inbox: "Write {date}_{qa-handoff|dev-rehandoff}-{prefix}-{NNN}.md to frontend/inbox/."
    verify: "`tail -20 issues/active/{file}.md` AND `ls frontend/inbox/` — both must show fresh artifacts before declaring handoff done."
    freshness: Re-handoff Dev Response timestamp > latest QA Verification timestamp, or QA's poll cycle skips the issue.
    note: Issue stays in active/. Do NOT move to completed/.

phase_5b_cleanup:
  name: Inbox cleanup
  rule: Move processed messages to inbox/completed/

phase_6_iterate:
  name: Iterate
  outcomes:
    pass: QA moves to completed/ — done
    blocked: Fix → gates → Phase 5 handoff (A+B) → move QA msg to completed/
    need_more_info: Respond → Phase 5 handoff (A+B) → move QA msg to completed/
  exit_condition: All completed by QA, queue empty, inbox clear

automation:
  commands:
    typecheck: npx tsc --noEmit
    unit: npx vitest run
    integration: npx vitest run --config vitest.integration.config.ts
  issue_prefix: UI-ISS
  session_path: memory/sessions/{date}-{issue-slug}.md
